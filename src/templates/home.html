<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insurance Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .main-card{
            margin-top:40px;
            margin-bottom:40px;
            border:none;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,.1);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            font-size:30px;
            font-weight:bold;
            padding:20px;
        }

        .result-card{
            margin-top:30px;
            border-radius:10px;
        }

        .btn-primary{
            width:100%;
            padding:12px;
            font-size:18px;
        }

        footer{
            margin-top:40px;
            text-align:center;
            color:gray;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="card main-card">

        <div class="card-header">
            Vehicle Insurance Prediction
        </div>

        <div class="card-body">

            <form action="/predict" method="post">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender</label>

                        <select class="form-select" name="Gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" name="Age" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Driving License</label>

                        <select class="form-select" name="Driving_License">

                            <option value="1">Yes</option>
                            <option value="0">No</option>

                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Region Code</label>
                        <input type="number" step="0.1" class="form-control" name="Region_Code" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Previously Insured</label>

                        <select class="form-select" name="Previously_Insured">

                            <option value="1">Yes</option>
                            <option value="0">No</option>

                        </select>
                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Vehicle Age</label>

                        <select class="form-select" name="Vehicle_Age">

                            <option value="< 1 Year">&lt; 1 Year</option>
                            <option value="1-2 Year">1-2 Year</option>
                            <option value="> 2 Years">&gt; 2 Years</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Vehicle Damage</label>

                        <select class="form-select" name="Vehicle_Damage">

                            <option value="Yes">Yes</option>
                            <option value="No">No</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Annual Premium</label>

                        <input
                                type="number"
                                class="form-control"
                                step="0.01"
                                name="Annual_Premium"
                                required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Policy Sales Channel
                        </label>

                        <input
                                type="number"
                                class="form-control"
                                step="0.1"
                                name="Policy_Sales_Channel"
                                required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Vintage
                        </label>

                        <input
                                type="number"
                                class="form-control"
                                name="Vintage"
                                required>

                    </div>

                </div>

                <button class="btn btn-primary mt-3">
                    Predict
                </button>

            </form>


            {% if prediction %}

            <div class="alert alert-success result-card">

                <h3 class="text-center">
                    Prediction Result
                </h3>

                <hr>

                <h4>
                    {{ prediction }}
                </h4>

                <h5>
                    Probability :
                    <strong>{{ probability }}%</strong>
                </h5>

            </div>

            {% endif %}

        </div>

    </div>

    <footer>

        <p>
            End-to-End Vehicle Insurance Prediction MLOps Project
        </p>

    </footer>

</div>

</body>

</html>
